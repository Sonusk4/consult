services:
  - type: web
    name: consult-admin
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps --workspaces && npm -C admin run build
    publishPath: admin/dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://consult-6cwy.onrender.com

  - type: web
    name: consult-frontend
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps --workspaces && npm -C frontend run build
    publishPath: frontend/dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: https://consult-6cwy.onrender.com
